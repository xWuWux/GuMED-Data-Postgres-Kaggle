name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/gumed-medical-api
  IMAGE_LOADER: ${{ github.repository }}/gumed-data-loader

jobs:
  # ============================================
  # JOB 1: Test with REAL PostgreSQL
  # ============================================
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      
      - name: Run tests
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/testdb"
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ============================================
  # JOB 2: Build & Push Images
  # ============================================
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Backend API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Data Loader
        uses: docker/build-push-action@v5
        with:
          context: ./data-loader
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_LOADER }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_LOADER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 3: Deploy to Kubernetes
  # ============================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.14.0'
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
      
      - name: Build Helm dependencies
        run: |
          cd helm/medical-platform
          helm dependency update
      
      - name: Deploy with Helm
        run: |
          helm upgrade --install medical-platform ./helm/medical-platform \
            --namespace medical \
            --create-namespace \
            --set backend.image.tag=${{ github.sha }} \
            --set dataLoader.image.tag=${{ github.sha }} \
            --set ingress.className=nginx \
            --wait --timeout 300s
      
      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl get pods -n medical
          kubectl get ingress -n medical
