apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "medical-platform.fullname" . }}-data-loader
  labels:
    {{- include "medical-platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "medical-platform.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "medical-platform.fullname" . }}-postgresql 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: data-loader
          image: "{{ .Values.dataLoader.image.repository }}:{{ .Values.dataLoader.image.tag }}"
          imagePullPolicy: {{ .Values.dataLoader.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.global.postgresql.auth.username }}:{{ .Values.global.postgresql.auth.password }}@{{ include "medical-platform.fullname" . }}-postgresql:5432/{{ .Values.global.postgresql.auth.database }}"
            - name: CSV_PATH
              value: "/data/heart_disease_uci.csv"
