apiVersion: v1
kind: Service
metadata:
  name: {{ include "medical-platform.fullname" . }}-backend
  labels:
    {{- include "medical-platform.labels" . | nindent 4 }}
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "medical-platform.selectorLabels" . | nindent 4 }}
    component: backend
