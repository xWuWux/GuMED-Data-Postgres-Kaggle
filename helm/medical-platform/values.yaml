global:
  postgresql:
    auth:
      postgresPassword: "postgres123"
      username: "medicaluser"
      password: "medical123"
      database: "medicaldb"

postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      size: 1Gi

metabase:
  enabled: true
  auth:
    username: "admin@medical.local"
    password: "Metabase123!"

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/xwuwux/gumed-medical-api
    tag: "latest"
    pullPolicy: Always

dataLoader:
  image:
    repository: ghcr.io/xwuwux/gumed-data-loader
    tag: "latest"
    pullPolicy: Always

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: api.medical.local
      paths:
        - path: /
          pathType: Prefix
          service: backend
    - host: metabase.medical.local
      paths:
        - path: /
          pathType: Prefix
          service: metabase
